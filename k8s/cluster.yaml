apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: nombre-eks
  region: us-east-1
  version: "1.31"

# Configuración correcta de CloudWatch para eksctl
cloudWatch:
  clusterLogging:
    enableTypes: ["api", "audit", "authenticator", "controllerManager", "scheduler"]

vpc:
  clusterEndpoints:
    publicAccess: true
    privateAccess: true

managedNodeGroups:
  - name: standard-workers
    instanceType: t3.medium
    minSize: 2
    maxSize: 4
    desiredCapacity: 2
    volumeSize: 20