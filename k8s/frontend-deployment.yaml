# --- FRONTEND SERVICE ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: tienda
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        # CORRECCIÓN: Usamos IMAGE_TAG para la automatización con el CI/CD
        image: 042764456140.dkr.ecr.us-east-1.amazonaws.com/frontend:IMAGE_TAG
        ports:
        - containerPort: 80
        resources:
          requests: { memory: "64Mi", cpu: "50m" }
          limits: { memory: "128Mi", cpu: "100m" }
        # RECOMENDACIÓN: Añade un livenessProbe básico para el frontend
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: tienda
spec:
  # LoadBalancer es perfecto aquí para exponer tu app a internet
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80