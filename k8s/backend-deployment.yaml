# --- MICROSERVICIO ACADÉMICO ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-academico
  namespace: tienda
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ms-academico
  template:
    metadata:
      labels:
        app: ms-academico
    spec:
      containers:
      - name: ms-academico
        image: 471112675233.dkr.ecr.us-east-1.amazonaws.com/ms-academico:latest
        ports:
        - containerPort: 8080
        envFrom:
          - configMapRef: { name: app-config }
          - secretRef: { name: mysql-secret }
        resources:
          requests: { memory: "256Mi", cpu: "250m" }
          limits: { memory: "512Mi", cpu: "500m" }
---
apiVersion: v1
kind: Service
metadata:
  name: ms-academico
  namespace: tienda
spec:
  selector: { app: ms-academico }
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ms-academico-hpa
  namespace: tienda
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: ms-academico }
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
---
