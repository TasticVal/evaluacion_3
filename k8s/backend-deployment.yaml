# --- BFF SERVICE ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff-service
  namespace: tienda
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bff-service
  template:
    metadata:
      labels:
        app: bff-service
    spec:
      containers:
      - name: bff-service
        image: 471112675233.dkr.ecr.us-east-1.amazonaws.com/bff-service:latest
        ports:
        - containerPort: 8080
        env:
        # Aquí configuramos las conexiones internas a los otros servicios
        - name: URL_ACADEMICO
          value: "http://ms-academico:8080/api/estudiantes"
        - name: URL_ASISTENCIA
          value: "http://ms-asistencia:8080/api/asistencia"
        - name: URL_COMUNICACIONES
          value: "http://ms-comunicaciones:8080/api/comunicaciones/resumen"
        resources:
          requests: { memory: "128Mi", cpu: "100m" }
          limits: { memory: "256Mi", cpu: "250m" }
---
apiVersion: v1
kind: Service
metadata:
  name: bff-service
  namespace: tienda
spec:
  selector: { app: bff-service }
  ports:
    - port: 8082
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bff-hpa
  namespace: tienda
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: bff-service }
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }